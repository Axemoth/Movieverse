<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
  >
    <div
      class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50"
    >
      <!-- Global Toast Container -->
      <div id="toast-container" class="fixed top-6 right-6 z-[200] flex flex-col gap-3"></div>

      <div class="flex justify-between items-center mb-6">
        <div id="user-info" class="hidden flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-emerald-500 to-cyan-500 flex items-center justify-center font-bold text-white shadow-lg shadow-emerald-500/20" id="user-avatar">?</div>
          <span id="username-display" class="text-emerald-400 font-medium tracking-wide"></span>
          <button onclick="logout()" class="px-5 py-2 bg-slate-700/50 hover:bg-slate-700 hover:text-white text-slate-300 rounded-full text-sm transition-all border border-slate-600/50 hover:border-slate-500">Logout</button>
        </div>
        <div id="auth-buttons" class="flex gap-4 ml-auto">
          <button onclick="showAuth('login')" class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors">Login</button>
          <button onclick="showAuth('register')" class="px-8 py-2.5 bg-emerald-500 hover:bg-emerald-400 text-white rounded-full font-bold shadow-lg shadow-emerald-500/30 transition-all active:scale-95">Register</button>
        </div>
      </div>

      <div class="text-center mb-10">
        <h1
          class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-cyan-400 to-blue-500 mb-6 tracking-tight"
        >
          ChaiCode Cinema<br />
          <span class="text-2xl font-bold text-slate-400 mt-2 block opacity-80 uppercase tracking-[0.2em]">Premium Seat Booking</span>
        </h1>
        <div class="inline-block px-6 py-2 rounded-full bg-rose-500/10 border border-rose-500/20 mb-4">
          <span class="text-rose-400 font-bold tracking-wider">NOW SHOWING: </span>
          <span class="text-white font-medium ml-2">Dhurandhar The Revenge</span>
        </div>
        <p class="text-slate-400 text-lg italic opacity-60">"Jassi ko ghar ki yaad kyu nhi aai?"</p>
      </div>

      <!-- Auth Modal -->
      <div id="auth-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-md transition-all duration-300 transform scale-100 opacity-100">
        <div class="bg-slate-900 border border-slate-700/50 w-full max-w-md rounded-[2.5rem] p-10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 to-cyan-500"></div>
          
          <div class="flex justify-between items-center mb-8">
            <h2 id="modal-title" class="text-3xl font-bold text-white tracking-tight">Login</h2>
            <button onclick="hideAuth()" class="w-10 h-10 flex items-center justify-center rounded-full text-slate-500 hover:text-white hover:bg-slate-800 transition-all">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>

          <div id="auth-msg" class="hidden mb-6 p-4 rounded-2xl text-sm font-medium transition-all"></div>

          <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-6">
            <div class="group">
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 group-focus-within:text-emerald-400 transition-colors">Username</label>
              <input type="text" id="auth-username" required class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500 transition-all font-medium">
            </div>
            <div class="group">
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 group-focus-within:text-emerald-400 transition-colors">Password</label>
              <input type="password" id="auth-password" required class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500 transition-all font-medium">
            </div>
            <button type="submit" id="auth-submit" class="w-full py-5 bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white font-bold rounded-2xl shadow-xl shadow-emerald-500/20 transition-all active:scale-[0.98] mt-4 flex items-center justify-center gap-3">
              <span id="auth-btn-text">Continue</span>
              <div id="auth-spinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
            <p id="auth-toggle-text" class="text-center text-slate-500 text-sm mt-6">
              Don't have an account? <a href="#" onclick="toggleAuth(event)" class="text-emerald-400 hover:text-emerald-300 hover:underline font-bold transition-colors">Register here</a>
            </p>
          </form>
        </div>
      </div>

      <div class="flex justify-center mb-10">
        <div
          class="bg-slate-900/50 rounded-full px-8 py-4 border border-slate-700/50 flex gap-10 items-center shadow-xl backdrop-blur-md"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-5 h-5 rounded-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]"
            ></div>
            <span class="text-slate-300 font-bold text-sm tracking-widest uppercase"
              >Available</span
            >
          </div>
          <div class="w-px h-6 bg-slate-700/50"></div>
          <div class="flex items-center gap-3">
            <div
              class="w-5 h-5 rounded-full bg-rose-500/20 border border-rose-500/50"
            ></div>
            <span class="text-slate-500 font-bold text-sm tracking-widest uppercase">Booked</span>
          </div>
        </div>
      </div>

      <div class="flex justify-center">
        <div
          class="bg-slate-900/40 p-10 rounded-[3rem] border border-slate-700/30 shadow-[inset_0_2px_10px_rgba(0,0,0,0.3)] backdrop-blur-sm"
        >
          <table
            id="tbl"
            class="border-separate border-spacing-6 mx-auto"
          ></table>
        </div>
      </div>
    </div>

    <!-- Frontend Logic -->
    <script src="main.js"></script>
  </body>
</html>
